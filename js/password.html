<h1>Change Password</h1>

<div class="card">

    <div class="group">
        <label for="old">Old Password</label>

        <div class="password-wrapper">
            <input type="password" name="first" id="old">
            <span class="toggle" onclick="togglePassword('old', this)">👁</span>
        </div>
    </div>


    <div class="group">
        <label for="new">Create New Password</label>

        <div class="password-wrapper">
            <input type="password" name="next" id="new">
            <span class="toggle" onclick="togglePassword('new', this)">👁</span>
        </div>
    </div>


    <div class="group">
        <label for="confirm">Confirm New Password</label>

        <div class="password-wrapper">
            <input type="password" name="final" id="confirm">
            <span class="toggle" onclick="togglePassword('confirm', this)">👁</span>
        </div>
    </div>


    <div class="final">
        <input type="submit">
    </div>

</div>


</body>
</html>
