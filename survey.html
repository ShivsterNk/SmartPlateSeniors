<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="meal.css">
    <link rel="stylesheet" href="survey.css">
    <title>Meal Survey</title>
</head>

<body>

<nav>
    <p class="logo">Smart Plate</p>

    <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="survey.html">Plan</a>
        <a href="signin.html">Sign In</a>
        <a href="meal.html">Pre-Meals</a>
    </div>
</nav>

    <h1>What meal plan do you want to enact?</h1>

    <div class="row">
    <p><b>What meals do you prefer?</b></p>
    <div class="options">
        <label for="most">Mostly pre Made</label>
        <input type="radio" name="meal" value="Mostly" id="most">
        
        <label for="mix">Mix</label>
        <input type="radio" name="meal" value="Mix" id="mix">
        
        <label for="custom">Custom</label>
        <input type="radio" name="meal" value="Custom" id="custom">
    </div>
</div>

    <div class="row">
    <p><b>Meals Per Day?</b></p>
    <div class="options">
        <label for="main">3 Main Meals</label>
        <input type="radio" name="meal" value="main" id="three">
        
        <label for="other">Other</label>
        <input type="radio" name="meal" value="other" id="other">
    </div>
</div>

<div class="row">    
<p><b>How simple should your meals be?</b></p>
    <div class="options">
        <label for="none">No Cooking</label>
        <input type="radio" name="meal" value="none" id="cooking">
        <label for="some">Some Cooking</label>
        <input type="radio" name="meal" value="some" id="cooking">
        <label for="enjoy">I enjoy cooking</label>
        <input type="radio" name="meal" value="enjoy" id="cooking">
    </div>
</div>

<div class="row">   
<p><b>How flexible should your plan be?</b></p>
    <div class="options">
        <label for="easy">Easy Swap</label>
        <input type="radio" name="meal" value="easy" id="swap">
        <label for="some">Some Structure</label>
        <input type="radio" name="meal" value="some" id="structure">
        <label for="fixed">Mostly Fixed</label>
        <input type="radio" name="meal" value="fixed" id="mostly">
    </div>
    </div>

    
    <div class="row">
    <p><b>Foods to Avoid or Prefer:</b></p>
    <div class="options">
        <label for="avoid"></label>
        <input type="text" name="first" id="idfirst" placeholder="Insert Here: " required>
    </div>
</div>

</body>
</html>
